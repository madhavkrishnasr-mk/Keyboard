<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make it Karnatic</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121214;
      color: #e1e1e6;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header styling */
    header {
      background-color: #1a1a1e;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #29292e;
      z-index: 10;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: #00adb5;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      width: 45%;
      max-width: 600px;
    }

    .search-bar input {
      flex: 1;
      background-color: #202024;
      border: 1px solid #29292e;
      padding: 10px 15px;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }

    .search-bar input:focus {
      border-color: #00adb5;
    }

    .search-bar button {
      background-color: #00adb5;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s;
    }

    .search-bar button:hover {
      background-color: #008c95;
    }

    .status-tag {
      font-size: 14px;
      color: #7c7c8a;
    }

    /* Main Grid Layout */
    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: 450px 1fr;
      gap: 20px;
      padding: 20px;
      height: calc(100vh - 180px);
      overflow: hidden;
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .video-card {
      background: #1a1a1e;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16/9;
      border: 1px solid #29292e;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #7c7c8a;
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }

    /* Notes Feed: Malayalam Notation script */
    .notes-feed {
      flex: 1;
      background: #1a1a1e;
      border-radius: 8px;
      border: 1px solid #29292e;
      padding: 15px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .notes-feed h3 {
      font-size: 16px;
      margin-bottom: 15px;
      color: #00adb5;
    }

    .notes-list {
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .note-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      background: #202024;
      border-radius: 6px;
      border-left: 4px solid #00adb5;
    }

    .carnatic-notation {
      font-size: 18px;
      font-weight: 500;
      color: #ffffff;
      letter-spacing: 1px;
    }

    .note-timestamp {
      color: #00adb5;
      font-family: monospace;
      font-size: 14px;
      background: rgba(0, 173, 181, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* Right panel: Visualizer Waterfall */
    .visualizer-panel {
      background: #1a1a1e;
      border-radius: 8px;
      border: 1px solid #29292e;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .visualizer-header {
      padding: 10px 15px;
      border-bottom: 1px solid #29292e;
      font-size: 14px;
      color: #e1e1e6;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .controls-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #visualizerCanvas {
      flex: 1;
      width: 100%;
      background: linear-gradient(to bottom, #141416, #1a1a1e);
    }

    /* Bottom Piano Setup */
    .keyboard-container {
      height: 120px;
      background: #09090a;
      display: flex;
      justify-content: center;
      padding-top: 5px;
      border-top: 2px solid #29292e;
      position: relative;
    }

    .piano {
      display: flex;
      position: relative;
    }

    .white-key {
      width: 40px;
      height: 105px;
      background: #f8f8f8;
      border: 1px solid #ccc;
      border-radius: 0 0 4px 4px;
      cursor: pointer;
      z-index: 1;
    }

    .white-key:active, .white-key.active {
      background: #dbdbdb;
      height: 103px;
    }

    .black-key {
      width: 26px;
      height: 65px;
      background: #121214;
      border: 1px solid #000;
      border-radius: 0 0 3px 3px;
      position: absolute;
      z-index: 2;
      cursor: pointer;
    }

    .black-key:active, .black-key.active {
      background: #3e3e44;
    }

    /* Key alignments */
    .bk-1 { left: 27px; }
    .bk-2 { left: 67px; }
    .bk-3 { left: 147px; }
    .bk-4 { left: 187px; }
    .bk-5 { left: 227px; }
    .bk-6 { left: 307px; }
    .bk-7 { left: 347px; }

    /* Mobile Responsive Layout overrides */
    @media (max-width: 768px) {
      body {
        overflow-y: auto;
        height: auto;
      }

      header {
        flex-direction: column;
        gap: 12px;
        padding: 15px;
        text-align: center;
      }

      .search-bar {
        width: 100%;
      }

      .workspace {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
        padding: 10px;
        gap: 15px;
      }

      .visualizer-panel {
        height: 300px;
      }

      .keyboard-container {
        position: sticky;
        bottom: 0;
        z-index: 100;
        justify-content: flex-start;
        overflow-x: auto;
        padding-left: 10px;
        padding-right: 10px;
        height: 130px;
        box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
      }
      
      .piano {
        padding-right: 20px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">🎹 Make it Karnatic</div>
    
    <div class="search-bar">
      <input type="text" id="youtubeUrl" placeholder="Paste YouTube Link here..." value="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
      <button onclick="loadSong()">Load Song</button>
    </div>
    
    <div class="status-tag" id="midiStatus">Audio: Active 🔊</div>
  </header>

  <div class="workspace">
    
    <div class="left-panel">
      <div class="video-card" id="videoContainer">
        <p>Paste a YouTube link above and click "Load Song" to launch the video tutorial stream.</p>
      </div>
      
      <div class="notes-feed">
        <h3>Detected Swaras / Notes</h3>
        <div class="notes-list" id="notesList">
          
          <div class="note-row">
            <div class="carnatic-notation">സ &nbsp; രി &nbsp; ഗ &nbsp; മ &nbsp; | &nbsp; പ &nbsp; ധ &nbsp; നി &nbsp; സ</div>
            <span class="note-timestamp">00:02</span>
          </div>
          
          <div class="note-row">
            <div class="carnatic-notation">മാാാ &nbsp; മാാാ &nbsp; | &nbsp; പ &nbsp; ധ &nbsp; നി &nbsp; സ</div>
            <span class="note-timestamp">00:06</span>
          </div>

          <div class="note-row">
            <div class="carnatic-notation">രിിി &nbsp; ഗ &nbsp; മ &nbsp; | &nbsp; പ &nbsp; ധ &nbsp; നി &nbsp; സ</div>
            <span class="note-timestamp">00:11</span>
          </div>
          
        </div>
      </div>
    </div>

    <div class="visualizer-panel">
      <div class="visualizer-header">
        <span>Falling Notes Stream</span>
        <div class="controls-group">
          <label for="speedSlider">Speed:</label>
          <input type="range" id="speedSlider" min="1" max="10" value="3">
        </div>
      </div>
      <canvas id="visualizerCanvas"></canvas>
    </div>

  </div>

  <div class="keyboard-container">
    <div class="piano">
      <div class="white-key" data-note="C4" onclick="playKey('C4')"></div>
      <div class="black-key bk-1" data-note="C#4" onclick="playKey('C#4')"></div>
      <div class="white-key" data-note="D4" onclick="playKey('D4')"></div>
      <div class="black-key bk-2" data-note="D#4" onclick="playKey('D#4')"></div>
      <div class="white-key" data-note="E4" onclick="playKey('E4')"></div>
      
      <div class="white-key" data-note="F4" onclick="playKey('F4')"></div>
      <div class="black-key bk-3" data-note="F#4" onclick="playKey('F#4')"></div>
      <div class="white-key" data-note="G4" onclick="playKey('G4')"></div>
      <div class="black-key bk-4" data-note="G#4" onclick="playKey('G#4')"></div>
      <div class="white-key" data-note="A4" onclick="playKey('A4')"></div>
      <div class="black-key bk-5" data-note="A#4" onclick="playKey('A#4')"></div>
      <div class="white-key" data-note="B4" onclick="playKey('B4')"></div>

      <div class="white-key" data-note="C5" onclick="playKey('C5')"></div>
      <div class="black-key bk-6" data-note="C#5" onclick="playKey('C#5')"></div>
      <div class="white-key" data-note="D5" onclick="playKey('D5')"></div>
      <div class="black-key bk-7" data-note="D#5" onclick="playKey('D#5')"></div>
      <div class="white-key" data-note="E5" onclick="playKey('E5')"></div>
    </div>
  </div>

  <script>
    // 1. Audio Engine Initialization (Web Audio API)
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new AudioContext();
      }
    }

    // Precise frequency tuning values mapping notes to Hz
    const noteFreqs = {
      "C4": 261.63, "C#4": 277.18, "D4": 293.66, "D#4": 311.13, "E4": 329.63,
      "F4": 349.23, "F#4": 369.99, "G4": 392.00, "G#4": 415.30, "A4": 440.00,
      "A#4": 466.16, "B4": 493.88, "C5": 523.25, "C#5": 554.37, "D5": 587.33,
      "D#5": 622.25, "E5": 659.25
    };

    // 2. Interactive Key Trigger & Synth Sound Generator
    function playKey(note) {
      initAudio();
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      const freq = noteFreqs[note];
      if (!freq) return;

      // Create raw oscillator and sound volume envelope elements
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      osc.type = 'triangle'; // Smooth tone structure suited for piano approximations
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      
      // ADSR Volume Envelope configuration to simulate piano decay physics
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.04); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8); 
      
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + 0.8);

      // Visual DOM Active CSS state feedback indicator triggering
      const targetKey = document.querySelector(`[data-note="${note}"]`);
      if(targetKey) {
        targetKey.classList.add('active');
        setTimeout(() => targetKey.classList.remove('active'), 150);
      }
    }

    // 3. YouTube Embed System Loader
    function loadSong() {
      const urlInput = document.getElementById('youtubeUrl').value;
      const videoContainer = document.getElementById('videoContainer');
      
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = urlInput.match(regExp);

      if (match && match[2].length === 11) {
        const videoId = match[2];
        videoContainer.innerHTML = `
          <iframe width="100%" height="100%" 
            src="https://www.youtube.com/embed/${videoId}?enablejsapi=1" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
          </iframe>`;
      } else {
        alert("Please enter a valid YouTube link.");
      }
    }

    // 4. Waterfall Animation Canvas System
    const canvas = document.getElementById('visualizerCanvas');
    const ctx = canvas.getContext('2d');
    const speedSlider = document.getElementById('speedSlider');
    
    function resizeCanvas() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight - 45; 
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let noteStreams = [
      { x: 40,  y: 0,    w: 40, h: 55, label: 'S' },
      { x: 120, y: -160, w: 40, h: 70, label: 'R' },
      { x: 200, y: -80,  w: 40, h: 55, label: 'G' },
      { x: 280, y: -260, w: 40, h: 80, label: 'M' }
    ];

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const speed = parseInt(speedSlider.value, 10);
      
      noteStreams.forEach(note => {
        ctx.fillStyle = '#00adb5';
        ctx.fillRect(note.x, note.y, note.w, note.h);
        
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(note.label, note.x + (note.w / 2), note.y + (note.h / 2));
        
        note.y += speed;
        if (note.y > canvas.height) {
          note.y = -90;
        }
      });

      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>
